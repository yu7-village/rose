<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyWay P2P ルーム (rose)</title>
    
    <script type="importmap">
    {
      "imports": {
        // コア機能
        "@skyway-sdk/room": "/node_modules/@skyway-sdk/room/dist/index.js",
        // メディア関連機能（roomパッケージのサブパスを指す）
        "@skyway-sdk/media": "/node_modules/@skyway-sdk/room/dist/media/index.js"
      }
    }
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }
        #videos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        video {
            width: 45%;
            max-width: 400px;
            height: auto;
            border: 1px solid #ccc;
            background-color: #000;
        }
        #controls button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        #remote-media-container {
            width: 45%;
            max-width: 400px;
            min-height: 200px;
            border: 1px solid #ccc;
            background-color: #000;
        }
    </style>
</head>
<body>
    <h1>SkyWay v3 P2P ビデオ通話アプリ</h1>
    <p>現在のルーム名: <strong id="room-name-display">未接続</strong></p>

    <div id="controls">
        <input type="text" id="room-id-input" placeholder="参加したいルームIDを入力" value="test-p2p-room">
        <button id="join-button">入室</button>
        <button id="leave-button" disabled>退出</button>
    </div>

    <div id="videos">
        <video id="local-video" autoplay playsinline muted></video>
        <div id="remote-media-container">
            <h2>相手</h2>
        </div> 
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
